<!DOCTYPE busconfig PUBLIC
  "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Allow solaarsd to own its well-known name on the system bus. -->
  <policy user="root">
    <allow own="org.solaarsd"/>
    <allow send_destination="org.solaarsd"/>
    <allow receive_sender="org.solaarsd"/>
  </policy>

  <!-- Allow any user to call methods and receive signals from solaarsd. -->
  <policy context="default">
    <allow send_destination="org.solaarsd"/>
    <allow receive_sender="org.solaarsd"/>
  </policy>
</busconfig>
