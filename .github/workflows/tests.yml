name: tests

on: [push, pull_request]

jobs:
  rust-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y libudev-dev libusb-1.0-0-dev

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Run tests (logitech-hidpp)
      run: cargo test --manifest-path logitech-hidpp/Cargo.toml

    - name: Run tests (solaars-cli)
      run: cargo test --manifest-path solaars-cli/Cargo.toml

    - name: Run tests (solaarsd)
      run: cargo test --manifest-path solaarsd/Cargo.toml

  rust-meson-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libudev-dev libusb-1.0-0-dev meson ninja-build

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-meson-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-meson-

    - name: Meson setup
      run: meson setup build

    - name: Build
      run: ninja -C build
